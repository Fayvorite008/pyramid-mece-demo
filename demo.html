<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #2D1654; color: #E0E0E0; font-family: sans-serif; padding: 40px; }
        .box { background: rgba(0,0,0,0.3); padding: 30px; border-radius: 15px; border: 2px solid #F5A623; max-width: 800px; margin: auto; }
        .sentence { padding: 10px; cursor: pointer; border-bottom: 1px solid #444; transition: 0.2s; }
        .sentence:hover { background: rgba(255,255,255,0.1); }
        .note { color: #D85A30; font-weight: bold; margin-top: 5px; display: none; }
        .good-section { display: none; margin-top: 20px; padding: 20px; border: 2px solid #1D9E75; background: rgba(29, 158, 117, 0.1); }
        button { background: #F5A623; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; margin-top: 20px; color: #2D1654; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Round 1: Pyramid Principle</h1>
        <div id="bad-example">
            <div class="sentence" onclick="this.querySelector('.note').style.display='block'">
                4月，我们盘点了关键词资产，建立了 Google Ads 基础框架，统一了品牌口径。
                <div class="note">❌ 问题点：上来就说做了什么，没有先给结论。</div>
            </div>
            <div class="sentence" onclick="this.querySelector('.note').style.display='block'">
                6月我们打算做 mini catalog，Sales Routing 等 Oliver 决策。
                <div class="note">❌ 问题点：计划与结论混杂，缺少层级。</div>
            </div>
        </div>
        <button onclick="document.getElementById('good-example').style.display='block'">揭示重构方案</button>
        <div id="good-example" class="good-section">
            <h3 style="color:#1D9E75">✅ Good Example</h3>
            <p><b>结论：</b>Q2 广告架构与市场跑通已完成，Q3 重点转向转化率优化。</p>
            <ul><li>核心架构：完成关键词资产与 Ads 框架。</li><li>策略决策：进行中，待 mini catalog 与 Sales Routing 支持。</li></ul>
        </div>
    </div>
</body>
</html>
